schema: spec-driven

context: |
  Project: overlai — voice-driven generative overlay Chrome extension (hackathon)
  Platform: Chrome Extension (Manifest V3), Next.js API backend on Vercel
  Extension stack: Vite 8 + CRXJS 2.7, React 19, TypeScript 6, Tailwind CSS 4, Framer Motion 12, Zod 4, Web Speech API
  Backend stack: Next.js 16 (App Router), TypeScript 5, Zod 4, Anthropic SDK (claude-haiku-4-5 / claude-sonnet-4-6), API-Football REST
  Architecture: content script injects overlay → popup captures voice → service worker calls backend → backend runs Claude structured output → Zod validates → extension renders via component registry
  Key constraint: API keys stay server-side; extension never holds secrets
  Hackathon MVP: 4 widgets (Scoreboard, Timer, StatPanel, Alert); one vertical slice end-to-end
  Phase 0 status: COMPLETE — both extension/ and backend/ are scaffolded and buildable
  Convention: backend/AGENTS.md warns that Next.js 16 has breaking changes; read node_modules/next/dist/docs/ before writing backend code

testing:
  strict_tdd: false
  reason: "No test runner installed in either extension/ or backend/. vitest is not in devDependencies. Strict TDD disabled until a test runner is added."
  unit:
    available: false
    tool: ~
    command: ~
  integration:
    available: false
    tool: ~
    command: ~
  e2e:
    available: false
    tool: ~
    command: ~
  coverage:
    available: false
    command: ~
  quality:
    linter:
      available: true
      extension_command: "cd extension && npm run lint"
      backend_command: "cd backend && npm run lint"
      tool: "ESLint 10 (extension), ESLint 9 + eslint-config-next (backend)"
    type_checker:
      available: true
      extension_command: "cd extension && npm run build"
      backend_command: "cd backend && npx tsc --noEmit"
      note: "extension uses tsc -b via vite build; backend has noEmit:true in tsconfig + strict:true"
    formatter: ~
  planned:
    - "vitest (extension unit tests — add to devDependencies when Phase 1 begins)"
    - "TypeScript strict mode already enabled in backend/tsconfig.json"
    - "Consider Prettier post-MVP"

rules:
  proposal:
    - Include rollback plan for risky changes
    - Map each proposal to PLAN.md build phases
    - Note Next.js 16 breaking changes risk for backend work (read backend/AGENTS.md)
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
    - Validate widget schemas with Zod before any render
  design:
    - Include sequence diagrams for complex flows (voice → backend → render)
    - Document architecture decisions with rationale
    - Preserve the registry pattern: Claude picks type, we render the component
  tasks:
    - Group by PLAN.md build phase (Phase 0–4)
    - Keep tasks completable in one session
    - Lock MVP to 4 widgets; OUT-of-scope items must be explicitly deferred
  apply:
    - Follow existing code patterns
    - Before writing any backend code, read backend/AGENTS.md (Next.js 16 breaking changes)
    tdd: false
    test_command: ""
  verify:
    test_command: ""
    build_command: "cd extension && npm run build && cd ../backend && npm run build"
    typecheck_command: "cd extension && npm run build && cd ../backend && npx tsc --noEmit"
    lint_command: "cd extension && npm run lint && cd ../backend && npm run lint"
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas
